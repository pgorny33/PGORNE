<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>P.GÓRNE</title>
  <meta name="description" content="P.GÓRNE — An atelier without limitation." />
  <style>
    :root{
      --paper:#f3efe8;
      --ink:#141414;
      --accent:#6B3529;
      --muted:#6f6a63;
    }
    *{box-sizing:border-box}
    html,body{width:100%;height:100%;margin:0;background:var(--paper);color:var(--ink);font-family: Georgia, 'Times New Roman', serif;}
    body{overflow:hidden;}
    .stage{position:fixed;inset:0;background:var(--paper);overflow:hidden;}
    video{position:absolute;inset:0;width:100vw;height:100vh;object-fit:cover;display:block;background:var(--paper);}

    /* Final exact logo overlay. This appears only after the animation finishes. */
    .final-logo-wrap{
      position:fixed;
      left:50%;
      top:50%;
      width:min(76vw,980px);
      aspect-ratio:1587.4/1122.52;
      transform:translate(-50%,-50%);
      opacity:0;
      pointer-events:none;
      transition:opacity 900ms ease;
    }
    .ready .final-logo-wrap{opacity:1;}
    .final-logo{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      user-select:none;
      -webkit-user-drag:none;
    }
    .accent-visual{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      background:var(--accent);
      opacity:0;
      -webkit-mask:url('assets/logo/pgorne_symbol.svg') center / contain no-repeat;
      mask:url('assets/logo/pgorne_symbol.svg') center / contain no-repeat;
      transform:translateY(0);
      transition:opacity 900ms ease;
      animation:accentLift 7s ease-in-out infinite;
      animation-delay:1.5s;
      pointer-events:none;
    }
    .ready .accent-visual{opacity:1;}
    @keyframes accentLift{
      0%,82%,100%{transform:translateY(0);}
      88%{transform:translateY(-5px);}
    }

    /* The visible accent is the actual uploaded symbol. This invisible button sits over it. */
    .accent-hotspot{
      position:absolute;
      left:50%;
      top:50%;
      width:36%;
      height:34%;
      transform:translate(-50%,-50%);
      appearance:none;
      border:0;
      background:transparent;
      cursor:pointer;
      opacity:0;
      pointer-events:none;
    }
    .ready .accent-hotspot{pointer-events:auto;}

    .menu{position:fixed;inset:0;background:rgba(243,239,232,.97);display:grid;place-items:center;opacity:0;pointer-events:none;transition:opacity 650ms ease;}
    .menu.open{opacity:1;pointer-events:auto;}
    nav{display:flex;flex-direction:column;gap:clamp(18px,3vh,30px);text-align:center;}
    nav a{font-family:Arial, Helvetica, sans-serif;text-decoration:none;color:var(--ink);font-size:clamp(24px,5vw,64px);letter-spacing:.08em;text-transform:uppercase;font-weight:300;}
    nav a:hover{color:var(--accent);}
    .close{position:fixed;top:28px;right:32px;appearance:none;border:0;background:transparent;font-family:Arial, Helvetica, sans-serif;letter-spacing:.18em;color:var(--ink);cursor:pointer;font-size:12px;text-transform:uppercase;}
    .fallback{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);font-family:Arial, Helvetica, sans-serif;letter-spacing:.22em;text-transform:uppercase;font-size:12px;color:var(--muted);display:none;}
    @media (max-width: 700px){
      .final-logo-wrap{width:118vw;}
      .accent-hotspot{width:42%;height:38%;}
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="P.GÓRNE opening animation">
    <video id="introVideo" autoplay muted playsinline poster="assets/poster.jpg">
      <source src="assets/pgorne-logo-animation-1080.mp4" type="video/mp4" media="(min-width: 800px)">
      <source src="assets/pgorne-logo-animation-720.mp4" type="video/mp4">
    </video>
    <div class="fallback">P.GÓRNE</div>
  </main>

  <div class="final-logo-wrap" aria-hidden="false">
    <img class="final-logo" src="assets/logo/pgorne_logo.svg" alt="P.GÓRNE" />
    <div class="accent-visual" aria-hidden="true"></div>
    <button class="accent-hotspot" id="enterButton" aria-label="Enter P.GÓRNE"></button>
  </div>

  <section class="menu" id="menu" aria-label="Site navigation">
    <button class="close" id="closeButton">Close</button>
    <nav>
      <a href="#philosophy">Philosophy</a>
      <a href="#atelier">Atelier</a>
      <a href="#archive">Archive</a>
      <a href="#journal">Journal</a>
      <a href="#ready-to-wear">Ready-to-Wear</a>
      <a href="mailto:info@pgorne.com">Contact</a>
    </nav>
  </section>

  <script>
    const video = document.getElementById('introVideo');
    const menu = document.getElementById('menu');
    const enter = document.getElementById('enterButton');
    const close = document.getElementById('closeButton');
    const revealEnter = () => document.body.classList.add('ready');

    video.addEventListener('ended', revealEnter);
    video.addEventListener('error', revealEnter);
    window.setTimeout(() => { if (!document.body.classList.contains('ready')) revealEnter(); }, 15000);
    enter.addEventListener('click', () => menu.classList.add('open'));
    close.addEventListener('click', () => menu.classList.remove('open'));
    document.addEventListener('keydown', e => { if (e.key === 'Escape') menu.classList.remove('open'); });
  </script>
</body>
</html>
